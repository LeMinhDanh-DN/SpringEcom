services:
  springecom_app:
    container_name: springecom_container
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_db:5432/ecom
      SPRING_DATASOURCE_USERNAME: Danh
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres_db:
        condition: service_healthy

  postgres_db:
    image: postgres:16
    container_name: postgres_container
    environment:
      POSTGRES_USER: Danh
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: ecom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Danh -d ecom"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: